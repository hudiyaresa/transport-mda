services:
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - airflow-networks

  grafana:
    image: grafana/grafana:10.3.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/transport_mda.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - airflow-networks

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "transport123"
      PG_HOST: sources
      PG_PORT: "5432"
      PG_DB: transport_db
      PG_USER: postgres
      PG_PASSWORD: postgres
    volumes:
      - ../../notebooks:/home/jovyan/work
    command: >
      bash -c "pip install --quiet geopandas folium psycopg2-binary sqlalchemy seaborn &&
               start-notebook.sh --NotebookApp.token='transport123'"
    networks:
      - airflow-networks

  metabase:
    image: metabase/metabase:v0.49.5
    container_name: metabase
    ports:
      - "3002:3000"
    environment:
      # Skip the setup wizard — log in immediately with these credentials
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      # Admin account auto-created on first start
      MB_SETUP_TOKEN: ""
      JAVA_TIMEZONE: Asia/Jakarta
    volumes:
      - metabase-data:/metabase-data
      - ./metabase/init.json:/app/init.json:ro
    networks:
      - airflow-networks
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      retries: 25
      start_period: 180s

  # One-shot container that waits for Metabase to be ready, then seeds the
  # PostgreSQL database connection via the Metabase API.
  metabase-init:
    image: curlimages/curl:latest
    container_name: metabase-init
    depends_on:
      metabase:
        condition: service_healthy
    volumes:
      - ./metabase/setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    networks:
      - airflow-networks
    restart: "no"

networks:
  airflow-networks:
    external: true

volumes:
  grafana-data:
    driver: local
    name: grafana-data
  metabase-data:
    driver: local
    name: metabase-data