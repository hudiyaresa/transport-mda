services:
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - airflow-networks

  grafana:
    image: grafana/grafana:10.3.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - airflow-networks

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "transport123"
      # DB credentials so the notebook can connect to PostgreSQL directly
      PG_HOST: sources
      PG_PORT: "5432"
      PG_DB: transport_db
      PG_USER: postgres
      PG_PASSWORD: postgres
    volumes:
      - ../../notebooks:/home/jovyan/work
    command: >
      bash -c "pip install --quiet geopandas folium psycopg2-binary sqlalchemy seaborn &&
               start-notebook.sh --NotebookApp.token='transport123'"
    networks:
      - airflow-networks

  # Metabase: open-source BI/dashboard tool.
  # Connect it to PostgreSQL (sources:5432/transport_db) via the UI on first start.
  # First-run setup wizard: http://localhost:3000
  metabase:
    image: metabase/metabase:v0.49.5
    container_name: metabase
    ports:
      - "3002:3000"
    environment:
      MB_DB_TYPE: h2   # uses embedded H2 for its own metadata (no extra PG needed)
    volumes:
      - metabase-data:/metabase-data
    networks:
      - airflow-networks
    restart: unless-stopped

networks:
  airflow-networks:
    external: true

volumes:
  grafana-data:
    driver: local
    name: grafana-data
  metabase-data:
    driver: local
    name: metabase-data
