global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "airflow"
    static_configs:
      - targets: ["statsd-exporter:9102"]

  - job_name: "fare_api"
    static_configs:
      - targets: ["fare-api:8000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
