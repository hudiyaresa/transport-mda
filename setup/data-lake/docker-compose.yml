services:
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: minio
    hostname: minio
    restart: always
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - airflow-networks

  createbuckets:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing myminio/${LOGS_BUCKET};
      /usr/bin/mc mb --ignore-existing myminio/${ML_BUCKET};
      /usr/bin/mc anonymous set download myminio/${LOGS_BUCKET};
      /usr/bin/mc anonymous set download myminio/${ML_BUCKET};
      echo 'Buckets ready';
      exit 0;
      "
    networks:
      - airflow-networks

networks:
  airflow-networks:
    external: true

volumes:
  minio-data:
    driver: local
    name: minio-data
